name: Agent Workflow Orchestration

on:
  issues:
    types: [opened, assigned, labeled]
  pull_request:
    types: [opened]

jobs:
  post-workflow-checklist:
    runs-on: ubuntu-latest
    permissions:
      issues: write
      pull-requests: write
    steps:
      - name: Ensure qa-failed label exists
        uses: actions/github-script@v7
        with:
          script: |
            try {
              await github.rest.issues.getLabel({
                owner: context.repo.owner,
                repo: context.repo.repo,
                name: 'qa-failed',
              });
            } catch (e) {
              if (e.status === 404) {
                await github.rest.issues.createLabel({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  name: 'qa-failed',
                  color: 'd93f0b',
                  description: 'QA found blocking defects; agent workflow requires restart with QA context.',
                });
              }
            }

      - name: Post / update agent workflow checklist
        uses: actions/github-script@v7
        with:
          script: |
            const MARKER = '<!-- agent-workflow-checklist -->';
            const owner = context.repo.owner;
            const repo = context.repo.repo;

            const isPR = context.eventName === 'pull_request';
            const number = isPR
              ? context.payload.pull_request.number
              : context.payload.issue.number;

            // Guard: for issue events, only run when:
            // - issue opened (always), OR
            // - assigned to copilot, OR
            // - qa-failed label applied (restart)
            if (!isPR) {
              const action = context.payload.action;

              if (action === 'assigned') {
                const assignee = context.payload.assignee?.login;
                if (assignee !== 'copilot') {
                  core.info(`Assigned to ${assignee}; not copilot. Skipping.`);
                  return;
                }
              }

              if (action === 'labeled') {
                const label = context.payload.label?.name;
                if (label !== 'qa-failed') {
                  core.info(`Labeled with ${label}; not qa-failed. Skipping.`);
                  return;
                }
              }
            }

            // Stable repo-root links (works in issues/PR comments)
            const defaultBranch = context.payload.repository.default_branch;
            const link = (path) => `/${owner}/${repo}/blob/${defaultBranch}/${path}`;

            const type = isPR ? 'pull request' : 'issue';
            const action = isPR ? 'opened' : context.payload.action;
            const isRestart = action === 'labeled';
            const header = isRestart
              ? '## 🔁 Agent Workflow Restarted (QA Failed)'
              : '## 🤖 Agent Workflow Initiated';

            const qaNote = isRestart
              ? [
                  '',
                  '> ⚠️ **QA findings detected.** Before invoking the Orchestrator, paste the QA defect report',
                  '> from the comment above into **Required Input §6** of the prompt.',
                  '',
                ]
              : [];

            const body = [
              MARKER,
              header,
              '',
              `This ${type} has been picked up by the automated agent workflow.`,
              'Invoke the Orchestrator Agent with the work order context to run all roles in a single pass.',
              '',
              '---',
              '',
              '### Quick Start',
              '',
              `1. Open [\`docs/dev-agents/ORCHESTRATOR.md\`](${link('docs/dev-agents/ORCHESTRATOR.md')}) and copy the full prompt.`,
              '2. Paste it into your AI assistant as the system prompt or first message.',
              '3. Fill in the **Required Inputs** table from the work order / issue body.',
              ...qaNote,
              '4. Submit — the Orchestrator will produce all eight sections (Research → Tech Lead → Backend → Frontend → DevOps → Security → QA → Docs) in one response.',
              '',
              '- [ ] **Orchestrator complete** — all eight sections produced and changes committed',
              '',
              '---',
              '',
              `> 📖 Full workflow guide: [\`docs/DEV_WORKFLOW.md\`](${link('docs/DEV_WORKFLOW.md')})`,
            ].join('\n');

            // De-dupe: update existing checklist comment if present; otherwise create it.
            const { data: comments } = await github.rest.issues.listComments({
              owner,
              repo,
              issue_number: number,
              per_page: 100,
            });

            const existing = comments.find(c => (c.body || '').includes(MARKER));

            if (existing) {
              await github.rest.issues.updateComment({
                owner,
                repo,
                comment_id: existing.id,
                body,
              });
            } else {
              await github.rest.issues.createComment({
                owner,
                repo,
                issue_number: number,
                body,
              });
            }
