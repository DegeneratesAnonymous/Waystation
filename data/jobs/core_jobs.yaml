# Job definitions for Frontier Waystation
# Jobs are tasks NPCs perform during their work or rest phase.
# schema_version: "1"

# ─────────────────────────────────────────────────────────────────────────────
# SHARED / REST
# ─────────────────────────────────────────────────────────────────────────────

- id: job.rest
  display_name: Resting
  schema_version: "1"
  phase: night          # preferred at night but available anytime if needed
  allowed_classes:
    - class.security
    - class.engineering
    - class.operations
  preferred_module_category: hab
  fallback_module_category: utility
  duration_ticks: 4     # how long one job cycle takes before re-evaluating
  skill_used: null
  resource_effects: {}
  need_effects:
    sleep: 0.25         # restores sleep per tick while active
    recreation: 0.03

- id: job.eat
  display_name: Eating
  schema_version: "1"
  phase: any
  allowed_classes:
    - class.security
    - class.engineering
    - class.operations
  preferred_module_category: hab
  fallback_module_category: utility
  duration_ticks: 2
  skill_used: null
  resource_effects:
    food: -1.0          # consumes food from station
  need_effects:
    food: 0.30          # restores food need significantly

# ─────────────────────────────────────────────────────────────────────────────
# SECURITY CLASS
# ─────────────────────────────────────────────────────────────────────────────

- id: job.guard_post
  display_name: Guard Post
  schema_version: "1"
  phase: day
  allowed_classes:
    - class.security
  preferred_module_category: security
  fallback_module_category: utility
  duration_ticks: 6
  skill_used: combat
  resource_effects: {}
  need_effects:
    sleep: -0.05
    recreation: 0.01
  station_effects:
    add_tag: station_guarded     # set while a security officer is on post

- id: job.patrol
  display_name: Patrol
  schema_version: "1"
  phase: day
  allowed_classes:
    - class.security
  preferred_module_category: dock
  fallback_module_category: utility
  duration_ticks: 3
  skill_used: perception
  resource_effects: {}
  need_effects:
    sleep: -0.06
    recreation: 0.02

- id: job.contraband_inspection
  display_name: Cargo Inspection
  schema_version: "1"
  phase: day
  allowed_classes:
    - class.security
  preferred_module_category: dock
  fallback_module_category: security
  duration_ticks: 4
  skill_used: investigation
  resource_effects: {}
  need_effects:
    sleep: -0.04

# ─────────────────────────────────────────────────────────────────────────────
# ENGINEERING CLASS
# ─────────────────────────────────────────────────────────────────────────────

- id: job.module_maintenance
  display_name: Maintenance
  schema_version: "1"
  phase: day
  allowed_classes:
    - class.engineering
  preferred_module_category: utility
  fallback_module_category: dock
  duration_ticks: 5
  skill_used: repair
  resource_effects:
    parts: -0.5         # consumes parts to repair
  need_effects:
    sleep: -0.05
  station_effects:
    repair_module: 0.02   # reduces damage on target module per tick

- id: job.power_management
  display_name: Power Grid
  schema_version: "1"
  phase: day
  allowed_classes:
    - class.engineering
  preferred_module_category: utility   # power_core is utility category
  fallback_module_category: utility
  duration_ticks: 4
  skill_used: technical
  resource_effects:
    power: 1.0          # skilled power management improves output slightly
  need_effects:
    sleep: -0.04

- id: job.life_support
  display_name: Life Support
  schema_version: "1"
  phase: day
  allowed_classes:
    - class.engineering
  preferred_module_category: utility
  fallback_module_category: hab
  duration_ticks: 4
  skill_used: technical
  resource_effects:
    oxygen: 1.0
    water: 0.5          # life support also processes ice into water
    ice: -0.5           # ice is processed into water/oxygen
  need_effects:
    sleep: -0.04

# ─────────────────────────────────────────────────────────────────────────────
# OPERATIONS CLASS
# ─────────────────────────────────────────────────────────────────────────────

- id: job.dock_control
  display_name: Dock Control
  schema_version: "1"
