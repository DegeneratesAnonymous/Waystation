  preferred_module_category: dock
  fallback_module_category: utility
  duration_ticks: 5
  skill_used: coordination
  resource_effects:
    credits: 2.0        # small income from coordinating docking fees
  need_effects:
    sleep: -0.04
    recreation: 0.05

- id: job.resource_management
  display_name: Resource Mgmt
  schema_version: "1"
  phase: day
  allowed_classes:
