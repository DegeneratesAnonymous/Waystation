  need_effects:
    sleep: -0.04
    recreation: 0.08

# ─────────────────────────────────────────────────────────────────────────────
# SHARED SOCIAL JOB
# ─────────────────────────────────────────────────────────────────────────────

- id: job.social_time
  display_name: Social Break
  schema_version: "1"
  phase: any
  allowed_classes:
    - class.security
    - class.engineering
    - class.operations
  preferred_module_category: hab
  fallback_module_category: utility
  duration_ticks: 3
  skill_used: null
  resource_effects: {}
  need_effects:
    recreation: 0.20    # significant recreation restoration
    sleep: -0.02        # mild fatigue

# ─────────────────────────────────────────────────────────────────────────────
# BUILDING / CONSTRUCTION
# ─────────────────────────────────────────────────────────────────────────────

- id: job.build
  display_name: Construction
  schema_version: "1"
  phase: day
  allowed_classes:
    - class.engineering
  preferred_module_category: utility
  fallback_module_category: utility
  duration_ticks: 1     # building system controls actual progress per tick
  skill_used: technical
  resource_effects: {}
  need_effects:
