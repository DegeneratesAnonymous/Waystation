# Station room type definitions for Frontier Waystation
# schema_version: "1"
#
# Fields:
#   id              — unique identifier, prefixed with "room."
#   display_name    — human-readable label shown in UI
#   description     — flavour text / purpose summary
#   category        — visual/gameplay category matching module categories
#   min_tiles       — minimum tile count required to assign this designation
#   module_id       — optional module.* definition ID that this room maps to for simulation
#   component_requirements — item IDs and quantities needed before assignment
#   resource_requirements  — resource keys and quantities consumed on assignment
#   benefits        — list of short strings describing gameplay gains
#   services        — list of service tags this room provides to the station

- id: room.hallway
  display_name: Hallway
  description: A pressurised passageway linking rooms and modules. Essential for efficient crew movement throughout the station.
  category: utility
  min_tiles: 2
  module_id: null
  component_requirements: {}
  resource_requirements: {}
  benefits:
    - Improves crew movement speed between adjacent rooms
    - Required for connecting distant sections of the station
  services:
    - passage

- id: room.cargo_hold
  display_name: Cargo Hold
  description: Pressurised bulk storage bay for raw materials, trade goods, and equipment. Supports item filtering and reserved allocation.
  category: cargo
  min_tiles: 6
  module_id: module.cargo_hold
  component_requirements:
    item.steel_plate: 4
    item.pressure_seal: 2
  resource_requirements:
    parts: 15
    credits: 200
  benefits:
    - Large item storage capacity (200 units)
    - Supports per-category reservation and priority filtering
    - Required for bulk trade operations
  services:
    - cargo_storage
    - cargo_handling

- id: room.kitchen
  display_name: Kitchen
  description: Food preparation and storage facility. Enables the crew to convert raw rations into proper meals, improving morale and health.
  category: production
  min_tiles: 4
  module_id: null
  component_requirements:
    item.circuit_board: 1
    item.steel_plate: 2
  resource_requirements:
    parts: 10
    credits: 150
  benefits:
    - Converts raw food into prepared meals (+morale)
    - Reduces food consumption waste
    - Crew mood bonus when staffed
  services:
    - food_preparation

- id: room.dining_hall
  display_name: Dining Hall
  description: Communal eating and social space. A well-maintained dining hall boosts crew morale and fosters faction relationships.
  category: hab
  min_tiles: 8
  module_id: null
  component_requirements:
    item.steel_plate: 2
  resource_requirements:
    food: 10
    credits: 100
  benefits:
    - Social morale bonus for crew eating here
    - Generates positive faction impressions from visitors
    - Increases crew rest quality
  services:
    - social
    - visitor_services

- id: room.dormitory
  display_name: Dormitory
  description: Shared sleeping quarters for general crew. Provides rest and recovery for up to twelve personnel.
  category: hab
  min_tiles: 6
  module_id: module.crew_quarters
  component_requirements:
    item.steel_plate: 2
    item.pressure_seal: 1
  resource_requirements:
    parts: 10
    credits: 120
  benefits:
    - Restores crew rest needs over time
    - Supports up to 12 occupants
    - Reduces oxygen consumption compared to open bunkrooms
  services:
    - crew_rest
    - hab

- id: room.bedroom
  display_name: Private Bedroom
  description: Single-occupancy private quarters offering better rest quality and privacy. Suitable for senior crew members.
  category: hab
  min_tiles: 3
  module_id: null
  component_requirements:
    item.steel_plate: 1
    item.pressure_seal: 1
  resource_requirements:
    parts: 8
    credits: 80
  benefits:
    - Superior rest quality vs. dormitory
    - Crew mood bonus (+0.15) for occupant
