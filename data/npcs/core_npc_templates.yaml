# NPC templates for Frontier Waystation
# schema_version: "1"

# ──────────────────────────────────────────────────────────────────────────────
# CREW TEMPLATES
# ──────────────────────────────────────────────────────────────────────────────

- id: npc.security_officer
  schema_version: "1"
  base_class: class.security
  allowed_subclasses:
    - class.security.enforcer
    - class.security.analyst
  skill_ranges:
    combat:       [4, 8]
    perception:   [3, 7]
    intimidation: [3, 7]
    technical:    [1, 3]
  trait_pool:
    - vigilant
    - disciplined
    - cynical
    - loyal
    - anxious
    - resilient
    - aggressive
    - methodical
  aspirations_pool:
    - Keep the station safe at all costs
    - Earn a command posting
    - Expose a hidden threat before it strikes
    - Build a reputation as the most reliable officer in the sector
    - Protect those who cannot protect themselves
  species_pool: [human]
  base_health: 110
  base_armor: 5
  base_speed: 10
  faction_bias:
    faction.imperial_remnant: 0.3
    faction.frontier_collective: 0.2
    faction.merchant_league: 0.2
  spawn_rules:
    role: crew

- id: npc.engineer
  schema_version: "1"
  base_class: class.engineering
  allowed_subclasses:
    - class.engineering.systems
    - class.engineering.fabricator
  skill_ranges:
    repair:       [4, 9]
    technical:    [4, 8]
    fabrication:  [3, 7]
    combat:       [1, 3]
  trait_pool:
    - meticulous
    - curious
    - introverted
    - practical
    - resilient
    - tired
    - optimistic
  aspirations_pool:
    - Design a module no one has built before
    - Keep every system running without a single failure
    - Fabricate a masterwork piece of equipment
    - Achieve perfect efficiency across the station's power grid
    - Leave this station better than you found it
  species_pool: [human]
  base_health: 90
  base_armor: 0
  base_speed: 9
  faction_bias:
    faction.merchant_league: 0.3
    faction.frontier_collective: 0.3
    faction.imperial_remnant: 0.2
  spawn_rules:
    role: crew

- id: npc.operations
  schema_version: "1"
  base_class: class.operations
  allowed_subclasses:
    - class.operations.quartermaster
    - class.operations.diplomat
  skill_ranges:
    logistics:     [4, 8]
    coordination:  [4, 8]
    negotiation:   [3, 7]
    combat:        [1, 3]
  trait_pool:
    - organized
    - diplomatic
    - pragmatic
    - ambitious
    - social
    - stressed
    - optimistic
  aspirations_pool:
    - Forge a lasting trade alliance with a major faction
    - Run the most efficient supply chain in the sector
    - Negotiate a peace between warring factions
    - Become the station's most indispensable crew member
    - Find a way to turn a profit in every situation
  species_pool: [human]
  base_health: 90
  base_armor: 0
  base_speed: 10
  faction_bias:
    faction.merchant_league: 0.4
    faction.imperial_remnant: 0.3
    faction.frontier_collective: 0.2
  spawn_rules:
    role: crew

