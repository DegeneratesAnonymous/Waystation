# NPC templates for Frontier Waystation
# schema_version: "1"

# ──────────────────────────────────────────────────────────────────────────────
# CREW TEMPLATES
# ──────────────────────────────────────────────────────────────────────────────

- id: npc.security_officer
  schema_version: "1"
  base_class: class.security
  allowed_subclasses:
    - class.security.enforcer
    - class.security.analyst
  skill_ranges:
    combat:       [4, 8]
    perception:   [3, 7]
    intimidation: [3, 7]
    technical:    [1, 3]
  trait_pool:
    - vigilant
    - disciplined
    - cynical
    - loyal
    - anxious
    - resilient
    - aggressive
    - methodical
  faction_bias:
    faction.imperial_remnant: 0.3
    faction.frontier_collective: 0.2
    faction.merchant_league: 0.2
  spawn_rules:
    role: crew

- id: npc.engineer
  schema_version: "1"
  base_class: class.engineering
  allowed_subclasses:
    - class.engineering.systems
    - class.engineering.fabricator
  skill_ranges:
    repair:       [4, 9]
    technical:    [4, 8]
    fabrication:  [3, 7]
    combat:       [1, 3]
  trait_pool:
    - meticulous
    - curious
    - introverted
    - practical
    - resilient
    - tired
    - optimistic
  faction_bias:
    faction.merchant_league: 0.3
    faction.frontier_collective: 0.3
    faction.imperial_remnant: 0.2
  spawn_rules:
    role: crew

- id: npc.operations
  schema_version: "1"
  base_class: class.operations
  allowed_subclasses:
    - class.operations.quartermaster
    - class.operations.diplomat
  skill_ranges:
    logistics:     [4, 8]
    coordination:  [4, 8]
    negotiation:   [3, 7]
    combat:        [1, 3]
  trait_pool:
    - organized
    - diplomatic
    - pragmatic
    - ambitious
    - social
    - stressed
    - optimistic
  faction_bias:
    faction.merchant_league: 0.4
    faction.imperial_remnant: 0.3
    faction.frontier_collective: 0.2
  spawn_rules:
    role: crew

