# Core buildable definitions for Frontier Waystation
# schema_version: "1"
#
# Buildables are items placed on the tile map as Foundations and constructed
# by Engineer NPCs.
#
# category:           "structure" (hull/room elements) | "object" (free-standing items)
# build_time_ticks:   ticks an engineer must spend building once materials are on-site
# required_materials: item_id -> quantity of materials to haul to the foundation
# build_quality:      default quality of the finished item
# size:               tiles the finished item occupies
# max_health:         starting hit-points of the finished item
#
# Health / functionality rules (applied to FoundationInstance once built):
#   100–75 % HP  →  1.0  (full function)
#   75–50 % HP   →  linearly degraded; 1 % worse per % below 75 %
#   <50 % HP     →  0.0  (non-functional; still pulls power if applicable)
#   0 % HP       →  destroyed

# ── Structure ──────────────────────────────────────────────────────────────────

- id: buildable.wall
  display_name: Wall
  category: structure
  schema_version: "1"
  description: >
    A solid reinforced wall segment. Provides atmospheric containment and
    separates pressurised areas from open space.
  build_time_ticks: 10
  required_materials:
    item.steel_plate: 5
  build_quality: standard
  size: 1
  max_health: 200

- id: buildable.floor
  display_name: Floor Panel
  category: structure
  schema_version: "1"
  description: >
    A standard pressurised floor tile. Required before a room can be
    designated and inhabited by crew.
  build_time_ticks: 8
  required_materials:
    item.steel_plate: 5
  build_quality: standard
  size: 1
  max_health: 150

- id: buildable.door
  display_name: Door
  category: structure
  schema_version: "1"
  description: >
    An automated airlock-style door. Separates rooms while allowing
    passage for authorised crew. Requires an adjacent pressurised floor.
  build_time_ticks: 15
  required_materials:
    item.steel_plate: 5
  build_quality: standard
  size: 1
  max_health: 120

# ── Objects ────────────────────────────────────────────────────────────────────

- id: buildable.storage_crate
  display_name: Storage Crate
  category: object
  schema_version: "1"
  description: >
    A sturdy metal storage crate. Can hold a modest quantity of loose
    cargo or spare parts and is quick to assemble.
  build_time_ticks: 6
  required_materials:
    item.steel_plate: 1
  build_quality: standard
  size: 1
  max_health: 80

- id: buildable.workbench
  display_name: Workbench
  category: object
  schema_version: "1"
  description: >
    A sturdy multi-purpose workbench for crafting and refining. Counts toward
    a room's workbench limit (max 3 per room). Workbenches gain a 5% speed
    bonus when the room meets all its requirements.
  build_time_ticks: 12
  required_materials:
    item.steel_plate: 3
  build_quality: standard
  size: 1
  max_health: 120
  is_workbench: true
  beauty_score: 2
  schema_version: "1"

- id: buildable.refinery_bench
  display_name: Refinery Bench
  category: object
  schema_version: "1"
  description: >
    Specialist workbench for refining raw ore and ice into usable materials.
    Counts toward the room workbench limit.
  build_time_ticks: 18
  required_materials:
    item.steel_plate: 4
    item.circuit_board: 1
  build_quality: standard
  size: 1
  max_health: 140
  is_workbench: true
  beauty_score: 0
  schema_version: "1"

- id: buildable.decorative_panel
  display_name: Decorative Panel
  category: object
  schema_version: "1"
  description: >
    A polished aesthetic panel that adds beauty to a room, improving crew
    mood and visitor impressions.
  build_time_ticks: 8
  required_materials:
    item.steel_plate: 1
  build_quality: standard
  size: 1
  max_health: 60
  is_workbench: false
  beauty_score: 10
  schema_version: "1"

- id: buildable.wall_art
  display_name: Wall Art
  category: object
  schema_version: "1"
  description: >
    A large decorative art installation. Significantly improves room beauty
    and crew morale.
  build_time_ticks: 10
  required_materials:
    item.steel_plate: 1
    item.credit_chit: 2
  build_quality: standard
  size: 1
  max_health: 50
  is_workbench: false
  beauty_score: 20
  schema_version: "1"
