# Core item definitions for Frontier Waystation
# schema_version: "1"
#
# item_type:  Material / Equipment / Biological / Valuables / Waste
# subtype:    functional grouping within the type
# weight:     cargo capacity units per item unit
# stack_size: max units in a single inventory slot
# value:      credits per unit
# perishable_ticks: 0 = not perishable; positive = ticks until decay

