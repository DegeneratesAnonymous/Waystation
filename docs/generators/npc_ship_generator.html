<!DOCTYPE html>
<!--
  npc_ship_generator.html
  Generates the npc_ship.png sprite atlas used by the Visitor System.

  Outputs:
    • npc_ship.png  — 264×66 px atlas, 4 ship variants × 66-px slot (64×64 sprite + 1px padding)
    • npc_shuttle.png — 16×16 px shuttle sprite
    • npc_landing_pad.png — 16×16 px landing pad floor marker

  Usage:
    Open this file in a browser. Click each "Download" button to save the PNGs.
    Copy the downloaded PNGs to: UnityProject/Assets/Art/Ships/

  Slot layout (npc_ship.png):
    ┌──────┬──────┬──────┬──────┐
    │  0   │  1   │  2   │  3   │
    │ Sml  │ Med  │ Lrg  │ Alien│
    │ Frt  │ Trd  │ Hlr  │  ?   │
    └──────┴──────┴──────┴──────┘
    Each cell is 66×66 px (64×64 sprite + 1 px padding all sides).
    Total atlas: 264×66 px.
-->
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>NPC Ship Sprite Generator — Waystation</title>
  <style>
    body { font-family: monospace; background: #111; color: #ddd; padding: 2rem; }
    h1   { color: #7cf; }
    h2   { color: #aef; margin-top: 2rem; }
    canvas { border: 1px solid #444; image-rendering: pixelated; display: block; margin: 0.5rem 0; }
    button { background: #335; color: #7cf; border: 1px solid #446; padding: 0.4rem 1rem;
             cursor: pointer; font-family: monospace; }
    button:hover { background: #446; }
    .row { display: flex; gap: 1rem; align-items: center; flex-wrap: wrap; }
    .label { color: #888; font-size: 0.8em; }
  </style>
</head>
<body>
<h1>🚀 NPC Ship Sprite Generator</h1>
<p>Generates the <code>npc_ship.png</code> atlas and supporting sprites for the Visitor System.</p>

<!-- ── Ship Atlas ─────────────────────────────────────────────────────────── -->
<h2>npc_ship.png — 264×66 px (4 variants × 66-px slot)</h2>
<canvas id="atlas" width="264" height="66"></canvas>
<div class="row">
  <canvas id="preview_atlas" width="528" height="132"></canvas>
  <p class="label">2× preview</p>
</div>
<button onclick="downloadCanvas('atlas','npc_ship.png')">⬇ Download npc_ship.png</button>

<!-- ── Shuttle Sprite ─────────────────────────────────────────────────────── -->
<h2>npc_shuttle.png — 16×16 px</h2>
<canvas id="shuttle" width="16" height="16"></canvas>
<div class="row">
  <canvas id="preview_shuttle" width="64" height="64"></canvas>
  <p class="label">4× preview</p>
</div>
<button onclick="downloadCanvas('shuttle','npc_shuttle.png')">⬇ Download npc_shuttle.png</button>

<!-- ── Landing Pad Sprite ─────────────────────────────────────────────────── -->
<h2>npc_landing_pad.png — 16×16 px</h2>
<canvas id="pad" width="16" height="16"></canvas>
<div class="row">
  <canvas id="preview_pad" width="64" height="64"></canvas>
  <p class="label">4× preview</p>
</div>
<button onclick="downloadCanvas('pad','npc_landing_pad.png')">⬇ Download npc_landing_pad.png</button>

<script>
// ── Utility ──────────────────────────────────────────────────────────────────

function hex(h) {
  const r = parseInt(h.slice(1,3),16), g = parseInt(h.slice(3,5),16), b = parseInt(h.slice(5,7),16);
  return `rgb(${r},${g},${b})`;
}

function poly(ctx, pts, fill, stroke) {
  ctx.beginPath();
  ctx.moveTo(pts[0][0], pts[0][1]);
  for (let i=1;i<pts.length;i++) ctx.lineTo(pts[i][0],pts[i][1]);
  ctx.closePath();
  if (fill)   { ctx.fillStyle=fill;   ctx.fill(); }
  if (stroke) { ctx.strokeStyle=stroke; ctx.lineWidth=1; ctx.stroke(); }
}

function rect(ctx, x,y,w,h, fill, stroke) {
  if (fill)   { ctx.fillStyle=fill;   ctx.fillRect(x,y,w,h); }
  if (stroke) { ctx.strokeStyle=stroke; ctx.lineWidth=1; ctx.strokeRect(x,y,w,h); }
}

function ellipse(ctx, x,y,w,h, fill) {
  ctx.beginPath();
  ctx.ellipse(x+w/2, y+h/2, w/2, h/2, 0, 0, Math.PI*2);
  ctx.fillStyle = fill;
  ctx.fill();
}

function downloadCanvas(id, filename) {
  const c = document.getElementById(id);
  const a = document.createElement('a');
  a.download = filename;
  a.href = c.toDataURL('image/png');
  a.click();
}

function scaledPreview(srcId, dstId, scale) {
  const src = document.getElementById(srcId);
  const dst = document.getElementById(dstId);
  dst.width  = src.width  * scale;
  dst.height = src.height * scale;
  const ctx = dst.getContext('2d');
  ctx.imageSmoothingEnabled = false;
  ctx.drawImage(src, 0, 0, dst.width, dst.height);
}

// ── Ship Variants ─────────────────────────────────────────────────────────────

const SLOT = 66, PAD = 1, SPR = 64;

const variants = [
  // 0: Small Freighter
  { body: '#64594f', engine: '#3c50c8', window: '#96dcff', outline: '#1e1e1e' },
  // 1: Medium Trader
  { body: '#466482', engine: '#50c850', window: '#dcc864', outline: '#1e1e1e' },
  // 2: Large Hauler
  { body: '#32373c', engine: '#c8643c', window: '#78c8dc', outline: '#1e1e1e' },
  // 3: Unknown / Alien
  { body: '#1e6450', engine: '#c832c8', window: '#c8ffb4', outline: '#1e1e1e' },
];

function drawVariant(ctx, i, v) {
  const ox = i * SLOT + PAD;
  const oy = PAD;

  if (i === 0) { // Small freighter — wedge
    poly(ctx, [[ox+32,oy+4],[ox+10,oy+54],[ox+54,oy+54]], v.body, v.outline);
    ellipse(ctx, ox+16, oy+48, 12, 10, v.engine);
    ellipse(ctx, ox+36, oy+48, 12, 10, v.engine);
    ellipse(ctx, ox+26, oy+18, 12, 12, v.window);
  }

  if (i === 1) { // Medium trader — elongated oval
    ellipse(ctx, ox+8,  oy+20, 48, 26, v.body);
    rect(ctx,  ox+20, oy+10, 24, 40, v.body, null);
    poly(ctx, [[ox+44,oy+28],[ox+44,oy+38],[ox+58,oy+33]], v.body, null);
    ctx.strokeStyle = v.outline; ctx.lineWidth=1;
    ctx.beginPath(); ctx.ellipse(ox+32, oy+33, 24, 13, 0, 0, Math.PI*2); ctx.stroke();
    rect(ctx, ox+6,  oy+38, 16, 10, v.engine, null);
    rect(ctx, ox+42, oy+38, 16, 10, v.engine, null);
    rect(ctx, ox+46, oy+29,  8,  8, v.window, null);
  }

  if (i === 2) { // Large hauler — boxy
    rect(ctx, ox+4,  oy+18, 56, 32, v.body, v.outline);
    rect(ctx, ox+4,  oy+12, 16,  8, '#504b46', null);
    rect(ctx, ox+44, oy+12, 16,  8, '#504b46', null);
    rect(ctx, ox+4,  oy+46, 56, 12, v.engine, null);
    for (let s=0;s<3;s++)
      rect(ctx, ox+14+s*12, oy+22, 8, 24, 'rgba(30,30,30,0.5)', null);
    rect(ctx, ox+46, oy+22, 12, 10, v.window, null);
  }

  if (i === 3) { // Alien — organic
    ellipse(ctx, ox+14, oy+14, 36, 36, v.body);
    poly(ctx, [[ox+32,oy+6],[ox+24,oy+18],[ox+40,oy+18]], v.body, null);
    poly(ctx, [[ox+6,oy+32],[ox+18,oy+24],[ox+18,oy+40]], v.body, null);
    poly(ctx, [[ox+58,oy+32],[ox+46,oy+24],[ox+46,oy+40]], v.body, null);
    ellipse(ctx, ox+24, oy+44, 16, 14, v.engine);
    ellipse(ctx, ox+26, oy+24, 12, 12, v.window);
    ellipse(ctx, ox+29, oy+27,  6,  6, '#14143c');
  }
}

// ── Main render ───────────────────────────────────────────────────────────────

window.onload = function() {
  // Ship atlas
  const atlas = document.getElementById('atlas');
  const actx  = atlas.getContext('2d');
  actx.clearRect(0,0,264,66);
  variants.forEach((v,i) => drawVariant(actx, i, v));
  scaledPreview('atlas','preview_atlas',2);

  // Shuttle
  const shutCtx = document.getElementById('shuttle').getContext('2d');
  shutCtx.clearRect(0,0,16,16);
  poly(shutCtx, [[8,1],[2,14],[14,14]], '#b4b4c8', '#323246');
  ellipse(shutCtx, 4, 10, 8, 5, '#6496ff');
  scaledPreview('shuttle','preview_shuttle',4);

  // Landing pad
  const padCtx = document.getElementById('pad').getContext('2d');
  padCtx.clearRect(0,0,16,16);
  rect(padCtx, 1,1,13,13, 'rgba(60,60,80,0.8)', '#6496c8');
  // H
  padCtx.strokeStyle='#64c8ff'; padCtx.lineWidth=1;
  padCtx.beginPath();
  padCtx.moveTo(4,5);  padCtx.lineTo(4,11);
  padCtx.moveTo(4,8);  padCtx.lineTo(12,8);
  padCtx.moveTo(12,5); padCtx.lineTo(12,11);
  padCtx.stroke();
  scaledPreview('pad','preview_pad',4);
};
</script>
</body>
</html>
