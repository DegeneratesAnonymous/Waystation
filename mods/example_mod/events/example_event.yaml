# Example mod event — demonstrates how mods add content.
# Drop any .yaml file into /mods/<mod_id>/events/ and it will be loaded
# automatically after core content.

- id: event.example_mod_mysterious_signal
  category: random
  schema_version: "1"
  title: "Mysterious Signal"
  description: >
    A fragmented signal is repeating on an old Imperial emergency frequency.
    It's been broadcasting for an unknown duration. The content is mostly
    static — but there's a pattern in it.
  weight: 0.3
  cooldown: 60
  required_tags: []
  excluded_tags: []
  trigger_conditions:
    - type: tick_above
      value: 10
  choices:
    - id: investigate
      label: "Analyze the signal — deploy comms crew"
      conditions: []
      outcomes:
        - type: log_message
          value: "Signal analysis underway. Results pending."
    - id: ignore
      label: "Log it and move on"
      conditions: []
      outcomes:
        - type: log_message
          value: "Signal logged. Whatever it is, it can wait."
    - id: broadcast
      label: "Re-broadcast the signal — see who responds"
      conditions: []
      outcomes:
        - type: log_message
          value: "You re-broadcast the signal on multiple bands. Then you wait."
