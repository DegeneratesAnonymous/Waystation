<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>NPC Back Item Neutral-Tone Master Generator</title>
<style>
*{box-sizing:border-box}
body{background:#0a0b0e;color:#c8d0e0;font-family:'Courier New',Courier,monospace;padding:20px;margin:0}
h2{color:#7090b0;margin:0 0 4px}
p{color:#4a5870;font-size:.85em;margin:0 0 12px}
canvas{display:block;image-rendering:pixelated;margin:8px 0}
.prv-wrap{overflow-x:auto;margin:8px 0;background:#06070a;padding:4px}
button{background:#151e30;color:#6099cc;border:1px solid #253550;padding:8px 18px;
        margin:4px;cursor:pointer;font-family:inherit;font-size:.9em;letter-spacing:.05em}
button:hover{background:#1e2e48}
</style>
</head>
<body>
<h2>NPC Back Item Neutral-Tone Master Generator</h2>
<p>5 types · 1 neutral master each · 170×50px</p>
<canvas id="atl"></canvas>
<canvas id="msk"></canvas>
<div class="prv-wrap"><canvas id="prv"></canvas></div>
<div>
  <button id="dlP">&#x2193; download PNG</button>
  <button id="dlM">&#x2193; download Mask PNG</button>
  <button id="dlJ">&#x2193; download JSON</button>
</div>
<script>

const TW=32,TH=48,SW=34,SH=50,PAD=1;
const NEUT_BASE='#7a7870', NEUT_HI='#989688', NEUT_SH='#58564c', NEUT_DK='#424038';
function h2r(h){return[parseInt(h.slice(1,3),16),parseInt(h.slice(3,5),16),parseInt(h.slice(5,7),16)];}
function sp(d,x,y,col,a=255){if(x<0||y<0||x>=TW||y>=TH)return;const[r,g,b]=h2r(col),i=(y*TW+x)*4;d[i]=r;d[i+1]=g;d[i+2]=b;d[i+3]=a;}
function hl(d,x1,x2,y,col,a=255){for(let x=Math.max(0,x1);x<=Math.min(TW-1,x2);x++)sp(d,x,y,col,a);}
function vl(d,x,y1,y2,col,a=255){for(let y=Math.max(0,y1);y<=Math.min(TH-1,y2);y++)sp(d,x,y,col,a);}
function fr(d,x1,y1,x2,y2,col,a=255){for(let y=Math.max(0,y1);y<=Math.min(TH-1,y2);y++)hl(d,x1,x2,y,col,a);}
function outline(d){
  const t=new Uint8ClampedArray(d.length);for(let i=0;i<d.length;i++)t[i]=d[i];
  for(let y=0;y<TH;y++)for(let x=0;x<TW;x++){
    if(t[(y*TW+x)*4+3]>0)continue;
    const nb=[[x-1,y],[x+1,y],[x,y-1],[x,y+1]];
    for(const[nx,ny]of nb)if(nx>=0&&nx<TW&&ny>=0&&ny<TH&&t[(ny*TW+nx)*4+3]>0){sp(d,x,y,'#080a0c');break;}
  }
}

const TYPE_NAMES=['none','backpack','quiver','jetpack','shield'];
function drawBack(d,t){
  if(t===0)return;
  const B=NEUT_BASE,H=NEUT_HI,S=NEUT_SH,DK=NEUT_DK;
  if(t===1){fr(d,10,12,21,36,B);hl(d,11,20,14,H);fr(d,12,37,13,42,S);fr(d,18,37,19,42,S);fr(d,13,11,18,12,S);fr(d,12,24,19,32,S);}
  else if(t===2){fr(d,14,8,17,38,B);vl(d,14,9,38,S);fr(d,13,7,18,9,S);fr(d,14,5,17,8,H);}
  else if(t===3){fr(d,11,12,20,34,B);fr(d,11,34,14,40,S);fr(d,17,34,20,40,S);hl(d,12,18,13,H);fr(d,12,39,13,42,DK);fr(d,18,39,19,42,DK);}
  else{fr(d,10,10,21,36,B);vl(d,10,10,36,S);vl(d,20,10,36,S);hl(d,10,20,36,S);fr(d,14,20,17,24,S);hl(d,11,19,12,H);}
  outline(d);
}
function drawBackMask(d,t){
  if(t===0)return;
  const P='#ff0000',SEC='#00ff00';
  if(t===1){fr(d,10,12,21,36,P);fr(d,13,11,18,12,SEC);fr(d,12,37,13,42,SEC);fr(d,18,37,19,42,SEC);}
  else if(t===2){fr(d,14,8,17,38,P);fr(d,13,7,18,9,SEC);}
  else if(t===3){fr(d,11,12,20,34,P);fr(d,11,34,14,40,SEC);fr(d,17,34,20,40,SEC);}
  else{fr(d,10,10,21,36,P);}
}

const COLS=5,AW=COLS*SW,AH=SH;
const atl=document.getElementById('atl'),msk=document.getElementById('msk');
atl.width=AW;atl.height=AH;msk.width=AW;msk.height=AH;
const actx=atl.getContext('2d'),mctx=msk.getContext('2d');
const tiles=[];
for(let s=0;s<COLS;s++){
  const id=actx.createImageData(TW,TH);drawBack(id.data,s);actx.putImageData(id,s*SW+PAD,PAD);
  const mid=mctx.createImageData(TW,TH);drawBackMask(mid.data,s);mctx.putImageData(mid,s*SW+PAD,PAD);
  const slots=s===0?[]:[{name:'primary',mask_colour:'#ff0000'},{name:'secondary',mask_colour:'#00ff00'}];
  tiles.push({id:`npc_back_${TYPE_NAMES[s]}`,col:s,row:0,tags:['npc','back',`type:${TYPE_NAMES[s]}`],colour_slots:slots});
}
const META={atlas:'npc_back.png',mask_atlas:'npc_back_mask.png',tile_size:{w:TW,h:TH},slot_size:{w:SW,h:SH},
  padding:PAD,pivot:'center',perspective:'top-down-north-fixed',category:'npc',tiles};

const prv=document.getElementById('prv');prv.width=AW*4;prv.height=AH*4;
const pc=prv.getContext('2d');
for(let py=0;py<AH*4;py+=8)for(let px=0;px<AW*4;px+=8){pc.fillStyle=((Math.floor(px/8)+Math.floor(py/8))%2===0)?'#14162a':'#0c0e1c';pc.fillRect(px,py,8,8);}
pc.imageSmoothingEnabled=false;pc.drawImage(atl,0,0,AW*4,AH*4);

document.getElementById('dlP').onclick=()=>atl.toBlob(b=>{const a=document.createElement('a');a.href=URL.createObjectURL(b);a.download='npc_back.png';a.click();});
document.getElementById('dlM').onclick=()=>msk.toBlob(b=>{const a=document.createElement('a');a.href=URL.createObjectURL(b);a.download='npc_back_mask.png';a.click();});
document.getElementById('dlJ').onclick=()=>{const b=new Blob([JSON.stringify(META,null,2)],{type:'application/json'});const a=document.createElement('a');a.href=URL.createObjectURL(b);a.download='npc_back.json';a.click();};
</script>
</body>
</html>
