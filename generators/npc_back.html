<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>NPC Back Item Atlas Generator — Neutral Master</title>
<style>
*{box-sizing:border-box}
body{background:#0a0b0e;color:#c8d0e0;font-family:'Courier New',Courier,monospace;padding:20px;margin:0}
h2{color:#7090b0;margin:0 0 4px}
p{color:#4a5870;font-size:.85em;margin:0 0 12px}
canvas{display:block;image-rendering:pixelated;margin:8px 0}
.prv-wrap{overflow-x:auto;margin:8px 0;background:#06070a;padding:4px}
button{background:#151e30;color:#6099cc;border:1px solid #253550;padding:8px 18px;
        margin:4px;cursor:pointer;font-family:inherit;font-size:.9em;letter-spacing:.05em}
button:hover{background:#1e2e48}
</style>
</head>
<body>
<h2>NPC Back Item Atlas Generator — Neutral Master</h2>
<p>5 types × 1 neutral master · 170×50px · + companion mask atlas</p>
<canvas id="atl"></canvas>
<canvas id="msk"></canvas>
<div class="prv-wrap"><canvas id="prv"></canvas></div>
<div>
  <button id="dlP">&#x2193; download npc_back.png</button>
  <button id="dlM">&#x2193; download npc_back_mask.png</button>
  <button id="dlJ">&#x2193; download npc_back.json</button>
</div>
<script>

const TW=32,TH=48,SW=34,SH=50,PAD=1;
const C={
  tBase:'#2d3040',tDeep:'#222530',tHi:'#424858',
  tLo:'#1c1f2c',tGrout:'#1a1d28',
  fBase:'#383c50',fLit:'#434860',fDark:'#252838',
  fShadow:'#141618',fBevel:'#4e5470',fGrout:'#161920',
  rHi:'#565e7a',rLo:'#2c3048',
  acc:'#4880aa',accG:'#111e30',accD:'#1a3a60',
};
const NMID='#909090',NLIT='#b0b0b0',NDRK='#707070',OUTLINE='#080a0c';

function h2r(h){return[parseInt(h.slice(1,3),16),parseInt(h.slice(3,5),16),parseInt(h.slice(5,7),16)];}
function sp(d,x,y,col,a=255){if(x<0||y<0||x>=TW||y>=TH)return;const[r,g,b]=h2r(col),i=(y*TW+x)*4;d[i]=r;d[i+1]=g;d[i+2]=b;d[i+3]=a;}
function hl(d,x1,x2,y,col,a=255){for(let x=Math.max(0,x1);x<=Math.min(TW-1,x2);x++)sp(d,x,y,col,a);}
function fr(d,x1,y1,x2,y2,col,a=255){for(let y=Math.max(0,y1);y<=Math.min(TH-1,y2);y++)hl(d,x1,x2,y,col,a);}
function outline(d){
  const t=new Uint8ClampedArray(d.length);for(let i=0;i<d.length;i++)t[i]=d[i];
  for(let y=0;y<TH;y++)for(let x=0;x<TW;x++){
    if(t[(y*TW+x)*4+3]>0)continue;
    const nb=[[x-1,y],[x+1,y],[x,y-1],[x,y+1]];
    for(const[nx,ny]of nb)if(nx>=0&&nx<TW&&ny>=0&&ny<TH&&t[(ny*TW+nx)*4+3]>0){sp(d,x,y,OUTLINE);break;}
  }
}

function drawBack(d,btype){
  if(btype===0)return;
  if(btype===1){fr(d,9,12,22,32,NMID);hl(d,10,21,12,NLIT);fr(d,12,14,19,20,NDRK);}
  else if(btype===2){for(let x=13;x<=17;x++)fr(d,x,8,x,36,x===13||x===17?NMID:NDRK);fr(d,12,6,19,10,NMID);}
  else if(btype===3){fr(d,10,10,21,32,NMID);hl(d,11,20,10,NLIT);fr(d,12,28,15,36,NDRK);fr(d,16,28,19,36,NDRK);}
  else if(btype===4){fr(d,9,10,22,34,NMID);hl(d,10,21,10,NLIT);fr(d,13,14,18,30,NLIT);}
  outline(d);
}

const SLOT1=[{name:'primary',mask_colour:'#ff0000'}];
const SLOT2P=[{name:'primary',mask_colour:'#ff0000'},{name:'pocket',mask_colour:'#00ff00'}];
const SLOT2N=[{name:'body',mask_colour:'#ff0000'},{name:'nozzle',mask_colour:'#00ff00'}];
const SLOT2E=[{name:'primary',mask_colour:'#ff0000'},{name:'emblem',mask_colour:'#00ff00'}];
const SLOTS=[[],SLOT2P,SLOT1,SLOT2N,SLOT2E];
const TYPE_NAMES=['none','backpack','quiver','jetpack','shield'];

const COLS=5,AW=COLS*SW,AH=SH;
const atl=document.getElementById('atl');atl.width=AW;atl.height=AH;
const msk=document.getElementById('msk');msk.width=AW;msk.height=AH;
const ctx=atl.getContext('2d');const mctx=msk.getContext('2d');
const tiles=[];

for(let t=0;t<5;t++){
  const id=ctx.createImageData(TW,TH);drawBack(id.data,t);
  ctx.putImageData(id,t*SW+PAD,PAD);
  const m=new ImageData(TW,TH);
  const[or,og,ob]=h2r(OUTLINE);const[dr,dg,db]=h2r(NDRK);const[lr,lg,lb]=h2r(NLIT);
  for(let i=0;i<id.data.length;i+=4){
    if(id.data[i+3]===0)continue;
    const r=id.data[i],g=id.data[i+1],b=id.data[i+2];
    if(r===or&&g===og&&b===ob){m.data[i]=0;m.data[i+1]=0;m.data[i+2]=0;m.data[i+3]=255;}
    else if(SLOTS[t].length>1&&(r===dr&&g===dg&&b===db||(t===4&&r===lr&&g===lg&&b===lb))){
      m.data[i]=0;m.data[i+1]=255;m.data[i+2]=0;m.data[i+3]=255;}
    else{m.data[i]=255;m.data[i+1]=0;m.data[i+2]=0;m.data[i+3]=255;}
  }
  mctx.putImageData(m,t*SW+PAD,PAD);
  tiles.push({id:`npc_back_${TYPE_NAMES[t]}`,col:t,row:0,
    tags:['npc','back',`type:${TYPE_NAMES[t]}`,'state:normal'],colour_slots:SLOTS[t]});
}

const META={atlas:'npc_back.png',mask_atlas:'npc_back_mask.png',
  tile_size:{w:TW,h:TH},slot_size:{w:SW,h:SH},padding:PAD,pivot:'center',
  perspective:'top-down-north-fixed',category:'npc',tiles};

const prv=document.getElementById('prv');prv.width=AW*4;prv.height=AH*4;
const pc=prv.getContext('2d');
for(let py=0;py<AH*4;py+=8)for(let px=0;px<AW*4;px+=8){pc.fillStyle=((Math.floor(px/8)+Math.floor(py/8))%2===0)?'#14162a':'#0c0e1c';pc.fillRect(px,py,8,8);}
pc.imageSmoothingEnabled=false;pc.drawImage(atl,0,0,AW*4,AH*4);

document.getElementById('dlP').onclick=()=>atl.toBlob(b=>{const a=document.createElement('a');a.href=URL.createObjectURL(b);a.download='npc_back.png';a.click();});
document.getElementById('dlM').onclick=()=>msk.toBlob(b=>{const a=document.createElement('a');a.href=URL.createObjectURL(b);a.download='npc_back_mask.png';a.click();});
document.getElementById('dlJ').onclick=()=>{const b=new Blob([JSON.stringify(META,null,2)],{type:'application/json'});const a=document.createElement('a');a.href=URL.createObjectURL(b);a.download='npc_back.json';a.click();};
</script>
</body>
</html>
