<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>NPC Hair Atlas Generator — Neutral Master</title>
<style>
*{box-sizing:border-box}
body{background:#0a0b0e;color:#c8d0e0;font-family:'Courier New',Courier,monospace;padding:20px;margin:0}
h2{color:#7090b0;margin:0 0 4px}
p{color:#4a5870;font-size:.85em;margin:0 0 12px}
canvas{display:block;image-rendering:pixelated;margin:8px 0}
.prv-wrap{overflow-x:auto;margin:8px 0;background:#06070a;padding:4px}
button{background:#151e30;color:#6099cc;border:1px solid #253550;padding:8px 18px;
        margin:4px;cursor:pointer;font-family:inherit;font-size:.9em;letter-spacing:.05em}
button:hover{background:#1e2e48}
</style>
</head>
<body>
<h2>NPC Hair Atlas Generator — Neutral Master</h2>
<p>5 styles × 1 neutral master · 170×50px · + companion mask atlas</p>
<canvas id="atl"></canvas>
<canvas id="msk"></canvas>
<div class="prv-wrap"><canvas id="prv"></canvas></div>
<div>
  <button id="dlP">&#x2193; download npc_hair.png</button>
  <button id="dlM">&#x2193; download npc_hair_mask.png</button>
  <button id="dlJ">&#x2193; download npc_hair.json</button>
</div>
<script>

const TW=32,TH=48,SW=34,SH=50,PAD=1;
const C={
  tBase:'#2d3040',tDeep:'#222530',tHi:'#424858',
  tLo:'#1c1f2c',tGrout:'#1a1d28',
  fBase:'#383c50',fLit:'#434860',fDark:'#252838',
  fShadow:'#141618',fBevel:'#4e5470',fGrout:'#161920',
  rHi:'#565e7a',rLo:'#2c3048',
  acc:'#4880aa',accG:'#111e30',accD:'#1a3a60',
};
// Neutral hair colours
const NMID='#b0a090', NLIT='#ccbcaa', NDRK='#807264', OUTLINE='#080a0c';
// Mask slot colours
const MRED='#ff0000', MGRN='#00ff00', MBLK='#000000';

function h2r(h){return[parseInt(h.slice(1,3),16),parseInt(h.slice(3,5),16),parseInt(h.slice(5,7),16)];}
function sp(d,x,y,col,a=255){if(x<0||y<0||x>=TW||y>=TH)return;const[r,g,b]=h2r(col),i=(y*TW+x)*4;d[i]=r;d[i+1]=g;d[i+2]=b;d[i+3]=a;}
function hl(d,x1,x2,y,col,a=255){for(let x=Math.max(0,x1);x<=Math.min(TW-1,x2);x++)sp(d,x,y,col,a);}
function fr(d,x1,y1,x2,y2,col,a=255){for(let y=Math.max(0,y1);y<=Math.min(TH-1,y2);y++)hl(d,x1,x2,y,col,a);}
function outline(d){
  const t=new Uint8ClampedArray(d.length);
  for(let i=0;i<d.length;i++)t[i]=d[i];
  for(let y=0;y<TH;y++)for(let x=0;x<TW;x++){
    if(t[(y*TW+x)*4+3]>0)continue;
    const nb=[[x-1,y],[x+1,y],[x,y-1],[x,y+1]];
    for(const[nx,ny]of nb)if(nx>=0&&nx<TW&&ny>=0&&ny<TH&&t[(ny*TW+nx)*4+3]>0){sp(d,x,y,OUTLINE);break;}
  }
}

function drawHair(d,style){
  if(style===0){
    hl(d,12,19,3,NMID);
    for(let y=4;y<=8;y++)hl(d,11,20,y,NMID);
    hl(d,11,20,9,NDRK); sp(d,10,7,NDRK); sp(d,21,7,NDRK);
    hl(d,13,18,4,NLIT);
  }else if(style===1){
    hl(d,12,19,2,NMID);
    for(let y=3;y<=13;y++)hl(d,11,20,y,NMID);
    hl(d,13,18,4,NLIT); hl(d,13,18,5,NLIT);
    for(let y=14;y<=28;y++){sp(d,10,y,NDRK);sp(d,11,y,NMID);sp(d,20,y,NMID);sp(d,21,y,NDRK);}
    for(let y=14;y<=26;y++)hl(d,12,19,y,NDRK);
  }else if(style===2){
    hl(d,12,19,2,NMID);
    for(let y=3;y<=13;y++)hl(d,11,20,y,NMID);
    hl(d,13,18,4,NLIT);
    for(let y=14;y<=19;y++){sp(d,10,y,NDRK);sp(d,11,y,NMID);sp(d,20,y,NMID);sp(d,21,y,NDRK);}
    for(let y=14;y<=18;y++)hl(d,12,19,y,NDRK);
  }else if(style===3){
    for(let y=3;y<=5;y++)hl(d,12,19,y,NMID);
    hl(d,13,18,3,NLIT); hl(d,11,20,5,NDRK);
    sp(d,11,6,NDRK); sp(d,20,6,NDRK);
  }else{
    hl(d,13,18,2,NMID);
    for(let y=3;y<=9;y++)hl(d,12,19,y,NMID);
    hl(d,14,17,3,NLIT);
    fr(d,14,10,17,11,NDRK);
    for(let y=11;y<=31;y++){sp(d,14,y,NDRK);sp(d,15,y,NMID);sp(d,16,y,NMID);sp(d,17,y,NDRK);}
    fr(d,14,31,17,33,NDRK);
  }
  outline(d);
}

function drawHairMask(base,style){
  const m=new ImageData(TW,TH);
  for(let i=0;i<base.data.length;i+=4){
    if(base.data[i+3]===0)continue;
    const r=base.data[i],g=base.data[i+1],b=base.data[i+2];
    const[or,og,ob]=h2r(OUTLINE);
    if(r===or&&g===og&&b===ob){m.data[i]=0;m.data[i+1]=0;m.data[i+2]=0;m.data[i+3]=255;}
    else{
      // ponytail: tie region is darker (NDRK secondary)
      if(style===4){
        const[dr,dg,db]=h2r(NDRK);
        if(r===dr&&g===dg&&b===db){
          m.data[i]=0;m.data[i+1]=255;m.data[i+2]=0;m.data[i+3]=255;continue;
        }
      }
      const[rr,rg,rb]=h2r(MRED);
      m.data[i]=rr;m.data[i+1]=rg;m.data[i+2]=rb;m.data[i+3]=255;
    }
  }
  return m;
}

const STYLE_NAMES=['short','long','medium','buzz','ponytail'];
// colour_slots per style
const SLOTS=[
  [{name:'primary',mask_colour:'#ff0000'}],
  [{name:'primary',mask_colour:'#ff0000'}],
  [{name:'primary',mask_colour:'#ff0000'}],
  [{name:'primary',mask_colour:'#ff0000'}],
  [{name:'primary',mask_colour:'#ff0000'},{name:'secondary',mask_colour:'#00ff00'}],
];

const COLS=5, AW=COLS*SW, AH=SH;
const atl=document.getElementById('atl'); atl.width=AW; atl.height=AH;
const msk=document.getElementById('msk'); msk.width=AW; msk.height=AH;
const ctx=atl.getContext('2d'); const mctx=msk.getContext('2d');
const tiles=[], maskTiles=[];

for(let s=0;s<5;s++){
  const id=ctx.createImageData(TW,TH);
  drawHair(id.data,s);
  ctx.putImageData(id,s*SW+PAD,PAD);
  const mid=drawHairMask(id,s);
  mctx.putImageData(mid,s*SW+PAD,PAD);
  tiles.push({id:`npc_hair_${STYLE_NAMES[s]}`,col:s,row:0,
    tags:['npc','hair',`style:${STYLE_NAMES[s]}`,'state:normal'],
    colour_slots:SLOTS[s]});
  maskTiles.push({id:`npc_hair_${STYLE_NAMES[s]}_mask`,col:s,row:0,
    tags:['npc','hair',`style:${STYLE_NAMES[s]}`,'state:normal','mask']});
}

const baseMeta={atlas:'npc_hair.png',mask_atlas:'npc_hair_mask.png',
  tile_size:{w:TW,h:TH},slot_size:{w:SW,h:SH},padding:PAD,pivot:'center',
  perspective:'top-down-north-fixed',category:'npc',tiles};

const prv=document.getElementById('prv');
prv.width=AW*4; prv.height=AH*4;
const pc=prv.getContext('2d');
for(let py=0;py<AH*4;py+=8)for(let px=0;px<AW*4;px+=8){
  pc.fillStyle=((Math.floor(px/8)+Math.floor(py/8))%2===0)?'#14162a':'#0c0e1c';
  pc.fillRect(px,py,8,8);
}
pc.imageSmoothingEnabled=false; pc.drawImage(atl,0,0,AW*4,AH*4);

document.getElementById('dlP').onclick=()=>atl.toBlob(b=>{
  const a=document.createElement('a');a.href=URL.createObjectURL(b);a.download='npc_hair.png';a.click();
});
document.getElementById('dlM').onclick=()=>msk.toBlob(b=>{
  const a=document.createElement('a');a.href=URL.createObjectURL(b);a.download='npc_hair_mask.png';a.click();
});
document.getElementById('dlJ').onclick=()=>{
  const b=new Blob([JSON.stringify(baseMeta,null,2)],{type:'application/json'});
  const a=document.createElement('a');a.href=URL.createObjectURL(b);a.download='npc_hair.json';a.click();
};
</script>
</body>
</html>
