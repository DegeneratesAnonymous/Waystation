<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>NPC Shirt Atlas Generator</title>
<style>
*{box-sizing:border-box}
body{background:#0a0b0e;color:#c8d0e0;font-family:'Courier New',Courier,monospace;padding:20px;margin:0}
h2{color:#7090b0;margin:0 0 4px}
p{color:#4a5870;font-size:.85em;margin:0 0 12px}
canvas{display:block;image-rendering:pixelated;margin:8px 0}
.prv-wrap{overflow-x:auto;margin:8px 0;background:#06070a;padding:4px}
button{background:#151e30;color:#6099cc;border:1px solid #253550;padding:8px 18px;
        margin:4px;cursor:pointer;font-family:inherit;font-size:.9em;letter-spacing:.05em}
button:hover{background:#1e2e48}
</style>
</head>
<body>
<h2>NPC Shirt Atlas Generator</h2>
<p>25 variants · 5 types × 5 colours · 850×50px</p>
<canvas id="atl"></canvas>
<div class="prv-wrap"><canvas id="prv"></canvas></div>
<div>
  <button id="dlP">&#x2193; download PNG</button>
  <button id="dlJ">&#x2193; download JSON</button>
</div>
<script>

const TW=32,TH=48,SW=34,SH=50,PAD=1;
const C={
  tBase:'#2d3040',tDeep:'#222530',tHi:'#424858',
  tLo:'#1c1f2c',tGrout:'#1a1d28',
  fBase:'#383c50',fLit:'#434860',fDark:'#252838',
  fShadow:'#141618',fBevel:'#4e5470',fGrout:'#161920',
  rHi:'#565e7a',rLo:'#2c3048',
  acc:'#4880aa',accG:'#111e30',accD:'#1a3a60',
};
function h2r(h){return[parseInt(h.slice(1,3),16),parseInt(h.slice(3,5),16),parseInt(h.slice(5,7),16)];}
function sp(d,x,y,col,a=255){if(x<0||y<0||x>=TW||y>=TH)return;const[r,g,b]=h2r(col),i=(y*TW+x)*4;d[i]=r;d[i+1]=g;d[i+2]=b;d[i+3]=a;}
function hl(d,x1,x2,y,col,a=255){for(let x=Math.max(0,x1);x<=Math.min(TW-1,x2);x++)sp(d,x,y,col,a);}
function vl(d,x,y1,y2,col,a=255){for(let y=Math.max(0,y1);y<=Math.min(TH-1,y2);y++)sp(d,x,y,col,a);}
function fr(d,x1,y1,x2,y2,col,a=255){for(let y=Math.max(0,y1);y<=Math.min(TH-1,y2);y++)hl(d,x1,x2,y,col,a);}
function dk(h,f){const[r,g,b]=h2r(h);return'#'+[r,g,b].map(c=>Math.max(0,Math.round(c*f)).toString(16).padStart(2,'0')).join('');}
function lt(h,f){const[r,g,b]=h2r(h);return'#'+[r,g,b].map(c=>Math.min(255,Math.round(c*f)).toString(16).padStart(2,'0')).join('');}
function outline(d){
  const t=new Uint8ClampedArray(d.length);
  for(let i=0;i<d.length;i++)t[i]=d[i];
  for(let y=0;y<TH;y++)for(let x=0;x<TW;x++){
    if(t[(y*TW+x)*4+3]>0)continue;
    const nb=[[x-1,y],[x+1,y],[x,y-1],[x,y+1]];
    for(const[nx,ny]of nb)if(nx>=0&&nx<TW&&ny>=0&&ny<TH&&t[(ny*TW+nx)*4+3]>0){sp(d,x,y,'#080a0c');break;}
  }
}


const SHIRT_NAMES=['tshirt','collar','uniform','vest','tank'];
const COLOR_NAMES=['grey','blue','green','red','brown'];
const COLOR_HEX  =['#808890','#305888','#307040','#883030','#705028'];
function drawShirt(d,type,col){
  const hi=lt(col,1.22), sh=dk(col,0.68), dk2=dk(col,0.50);
  const btn='#c8b870';
  if(type===0){// t-shirt – torso + short sleeves
    for(let y=17;y<=31;y++)hl(d,11,20,y,col);
    for(let y=17;y<=22;y++){hl(d,8,11,y,col);hl(d,20,23,y,col);}
    // collar hole
    hl(d,14,17,16,dk2);
    vl(d,11,18,30,hi); vl(d,20,18,30,sh);
    // sleeve seam
    vl(d,11,17,22,sh); vl(d,20,17,22,sh);
  } else if(type===1){// collar – long sleeves + V neck
    for(let y=17;y<=31;y++)hl(d,11,20,y,col);
    for(let y=17;y<=31;y++){hl(d,8,11,y,col);hl(d,20,23,y,col);}
    // V-collar
    sp(d,14,16,sh);sp(d,15,17,sh);sp(d,16,16,sh);
    sp(d,14,17,sh);sp(d,16,17,sh);
    // buttons
    sp(d,15,19,btn);sp(d,15,22,btn);sp(d,15,25,btn);sp(d,15,28,btn);
    vl(d,11,18,30,hi); vl(d,20,18,30,sh);
  } else if(type===2){// uniform – long sleeves + epaulettes + buttons
    for(let y=17;y<=31;y++)hl(d,11,20,y,col);
    for(let y=17;y<=31;y++){hl(d,8,11,y,col);hl(d,20,23,y,col);}
    // stand collar
    hl(d,12,19,15,sh); hl(d,13,18,16,dk2);
    // epaulettes
    hl(d,8,11,17,hi); hl(d,20,23,17,hi);
    // button strip
    for(let y=18;y<=30;y+=3)sp(d,15,y,btn);
    vl(d,11,18,30,hi); vl(d,20,18,30,sh);
    // chest pocket
    fr(d,12,20,14,23,sh);
  } else if(type===3){// vest – no arms, armhole cutout
    for(let y=17;y<=31;y++)hl(d,12,19,y,col);
    for(let y=31;y<=35;y++)hl(d,11,20,y,col);
    // lapels
    sp(d,13,16,sh);sp(d,12,17,sh);sp(d,13,17,sh);
    sp(d,18,16,sh);sp(d,18,17,sh);sp(d,19,17,sh);
    // pockets
    fr(d,12,22,14,25,sh);fr(d,17,22,19,25,sh);
    // buttons
    sp(d,15,19,btn);sp(d,15,23,btn);sp(d,15,27,btn);
    vl(d,12,18,30,hi); vl(d,19,18,30,sh);
  } else {// tank top – narrow straps
    for(let y=18;y<=31;y++)hl(d,12,19,y,col);
    // straps
    for(let y=15;y<=18;y++){sp(d,12,y,col);sp(d,13,y,col);sp(d,18,y,col);sp(d,19,y,col);}
    vl(d,12,18,30,hi); vl(d,19,18,30,sh);
  }
  outline(d);
}
const COLS=25, AW=COLS*SW, AH=SH;
const atl=document.getElementById('atl');
atl.width=AW; atl.height=AH;
const ctx=atl.getContext('2d');
const tiles=[];
for(let t=0;t<5;t++)for(let c=0;c<5;c++){
  const col=t*5+c;
  const id=ctx.createImageData(TW,TH);
  drawShirt(id.data,t,COLOR_HEX[c]);
  ctx.putImageData(id,col*SW+PAD,PAD);
  tiles.push({id:`npc_shirt_${SHIRT_NAMES[t]}_${COLOR_NAMES[c]}`,col,row:0,
    tags:['npc','shirt',`type:${SHIRT_NAMES[t]}`,`color:${COLOR_NAMES[c]}`,'state:normal']});
}
const META={atlas:'npc_shirt.png',tile_size:{w:TW,h:TH},slot_size:{w:SW,h:SH},
  padding:PAD,pivot:'center',perspective:'top-down-north-fixed',category:'npc',tiles};

// ── preview 4× ──
const prv=document.getElementById('prv');
prv.width=AW*4;prv.height=AH*4;
const pc=prv.getContext('2d');
for(let py=0;py<AH*4;py+=8)for(let px=0;px<AW*4;px+=8){
  pc.fillStyle=((Math.floor(px/8)+Math.floor(py/8))%2===0)?'#14162a':'#0c0e1c';
  pc.fillRect(px,py,8,8);
}
pc.imageSmoothingEnabled=false;
pc.drawImage(atl,0,0,AW*4,AH*4);
// ── downloads ──
document.getElementById('dlP').onclick=()=>atl.toBlob(b=>{
  const a=document.createElement('a');a.href=URL.createObjectURL(b);
  a.download='npc_shirt.png';a.click();
});
document.getElementById('dlJ').onclick=()=>{
  const b=new Blob([JSON.stringify(META,null,2)],{type:'application/json'});
  const a=document.createElement('a');a.href=URL.createObjectURL(b);
  a.download='npc_shirt.json';a.click();
};
</script>
</body>
</html>
