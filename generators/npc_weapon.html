<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>NPC Weapon Atlas Generator</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box}
body{background:#0a0b0e;color:#c8d0e0;font-family:'Share Tech Mono',monospace;padding:20px;margin:0}
h2{color:#7090b0;margin:0 0 4px}
p{color:#4a5870;font-size:.85em;margin:0 0 12px}
canvas{display:block;image-rendering:pixelated;margin:8px 0}
.prv-wrap{overflow-x:auto;margin:8px 0;background:#06070a;padding:4px}
button{background:#151e30;color:#6099cc;border:1px solid #253550;padding:8px 18px;
        margin:4px;cursor:pointer;font-family:inherit;font-size:.9em;letter-spacing:.05em}
button:hover{background:#1e2e48}
</style>
</head>
<body>
<h2>NPC Weapon Atlas Generator</h2>
<p>20 variants · 8 weapons + 12 reserved · 680×50px</p>
<canvas id="atl"></canvas>
<div class="prv-wrap"><canvas id="prv"></canvas></div>
<div>
  <button id="dlP">&#x2193; download PNG</button>
  <button id="dlJ">&#x2193; download JSON</button>
</div>
<script>

const TW=32,TH=48,SW=34,SH=50,PAD=1;
const C={
  tBase:'#2d3040',tDeep:'#222530',tHi:'#424858',
  tLo:'#1c1f2c',tGrout:'#1a1d28',
  fBase:'#383c50',fLit:'#434860',fDark:'#252838',
  fShadow:'#141618',fBevel:'#4e5470',fGrout:'#161920',
  rHi:'#565e7a',rLo:'#2c3048',
  acc:'#4880aa',accG:'#111e30',accD:'#1a3a60',
};
function h2r(h){return[parseInt(h.slice(1,3),16),parseInt(h.slice(3,5),16),parseInt(h.slice(5,7),16)];}
function sp(d,x,y,col,a=255){if(x<0||y<0||x>=TW||y>=TH)return;const[r,g,b]=h2r(col),i=(y*TW+x)*4;d[i]=r;d[i+1]=g;d[i+2]=b;d[i+3]=a;}
function hl(d,x1,x2,y,col,a=255){for(let x=Math.max(0,x1);x<=Math.min(TW-1,x2);x++)sp(d,x,y,col,a);}
function vl(d,x,y1,y2,col,a=255){for(let y=Math.max(0,y1);y<=Math.min(TH-1,y2);y++)sp(d,x,y,col,a);}
function fr(d,x1,y1,x2,y2,col,a=255){for(let y=Math.max(0,y1);y<=Math.min(TH-1,y2);y++)hl(d,x1,x2,y,col,a);}
function dk(h,f){const[r,g,b]=h2r(h);return'#'+[r,g,b].map(c=>Math.max(0,Math.round(c*f)).toString(16).padStart(2,'0')).join('');}
function lt(h,f){const[r,g,b]=h2r(h);return'#'+[r,g,b].map(c=>Math.min(255,Math.round(c*f)).toString(16).padStart(2,'0')).join('');}
function outline(d){
  const t=new Uint8ClampedArray(d.length);
  for(let i=0;i<d.length;i++)t[i]=d[i];
  for(let y=0;y<TH;y++)for(let x=0;x<TW;x++){
    if(t[(y*TW+x)*4+3]>0)continue;
    const nb=[[x-1,y],[x+1,y],[x,y-1],[x,y+1]];
    for(const[nx,ny]of nb)if(nx>=0&&nx<TW&&ny>=0&&ny<TH&&t[(ny*TW+nx)*4+3]>0){sp(d,x,y,'#080a0c');break;}
  }
}


const WPN_NAMES=['none','pistol','rifle','shotgun','knife','bat','wrench','shield_weapon'];
function drawWeapon(d,type){
  if(type===0)return;// none
  const metal='#7888a0', metalHi='#a0b0c0', metalSh='#404858';
  const wood='#805030', woodHi='#a06840', woodSh='#503018';
  const dark='#282830';
  if(type===1){// pistol – L-shape in right hand
    // barrel
    fr(d,17,28,25,30,metal);
    hl(d,17,25,28,metalHi);
    // grip
    fr(d,21,30,23,35,wood);
    vl(d,21,30,35,woodHi);
    // trigger guard
    sp(d,20,31,metalSh);sp(d,20,32,metalSh);sp(d,21,33,metalSh);
    // sight
    sp(d,17,27,dark);
    outline(d);
  } else if(type===2){// rifle – long horizontal + stock
    // barrel
    fr(d,4,27,26,29,metal);
    hl(d,4,26,27,metalHi);
    // body/receiver
    fr(d,16,27,24,31,metalSh);
    // stock
    fr(d,22,28,27,32,wood);
    vl(d,22,29,32,woodHi);
    // grip
    fr(d,19,30,21,34,wood);
    // sight
    sp(d,8,26,dark); sp(d,12,26,dark);
    // magazine
    fr(d,17,31,20,35,dark);
    outline(d);
  } else if(type===3){// shotgun – shorter, wider barrel
    fr(d,8,27,24,30,metal);
    hl(d,8,24,27,metalHi);
    fr(d,18,28,24,31,metalSh);
    // pump
    fr(d,10,29,16,31,woodHi);
    // stock
    fr(d,21,29,26,33,wood);
    vl(d,21,30,33,woodHi);
    // grip
    fr(d,19,31,21,35,wood);
    outline(d);
  } else if(type===4){// knife – thin diagonal blade
    // blade
    for(let i=0;i<10;i++){sp(d,21-i,26+i,metalHi);sp(d,22-i,26+i,metal);}
    sp(d,11,36,metalSh);
    // guard
    hl(d,20,22,35,dark);
    // handle
    for(let y=36;y<=40;y++){sp(d,18,y,wood);sp(d,19,y,woodHi);}
    outline(d);
  } else if(type===5){// bat – elongated oval
    // barrel
    for(let y=20;y<=30;y++){sp(d,20,y,woodHi);sp(d,21,y,wood);}
    // wide end
    for(let y=20;y<=26;y++){sp(d,19,y,woodHi);sp(d,22,y,woodSh);}
    hl(d,19,22,20,woodHi);
    // grip
    for(let y=30;y<=38;y++){sp(d,20,y,woodSh);sp(d,21,y,wood);}
    hl(d,19,22,30,woodSh);
    // grip tape
    for(let y=33;y<=38;y+=2)hl(d,20,21,y,dark);
    outline(d);
  } else if(type===6){// wrench – T-head
    // handle
    for(let y=28;y<=40;y++){sp(d,19,y,metal);sp(d,20,y,metalHi);}
    // head jaws
    fr(d,16,23,23,25,metal);
    hl(d,16,23,23,metalHi);
    fr(d,16,26,23,28,metal);
    // jaw gap
    hl(d,17,22,24,dark);
    // hex nut opening
    fr(d,17,24,22,27,metalSh);
    vl(d,16,23,28,metalHi);
    outline(d);
  } else {// shield_weapon – large kite shield held in front-left
    // body
    fr(d,7,17,17,30,metal);
    // lower point
    sp(d,8,31,metal);sp(d,9,32,metal);sp(d,10,33,metal);
    sp(d,11,34,metal);sp(d,12,33,metal);sp(d,13,32,metal);sp(d,14,31,metal);sp(d,15,31,metal);sp(d,16,31,metal);sp(d,17,31,metal);
    // rim
    vl(d,7,17,31,metalHi); hl(d,7,17,17,metalHi);
    vl(d,17,17,31,metalSh); 
    // boss
    fr(d,10,22,14,25,metalHi);
    // cross
    vl(d,12,18,30,metalSh); hl(d,8,16,24,metalSh);
    outline(d);
  }
}
const WPN_TOTAL=20;
const COLS=WPN_TOTAL, AW=COLS*SW, AH=SH;
const atl=document.getElementById('atl');
atl.width=AW; atl.height=AH;
const ctx=atl.getContext('2d');
const tiles=[];
for(let i=0;i<WPN_TOTAL;i++){
  const id=ctx.createImageData(TW,TH);
  if(i<8){
    drawWeapon(id.data,i);
    ctx.putImageData(id,i*SW+PAD,PAD);
    tiles.push({id:`npc_weapon_${WPN_NAMES[i]}`,col:i,row:0,
      tags:['npc','weapon',`type:${WPN_NAMES[i]}`,'state:normal']});
  } else {
    // reserved – leave transparent
    ctx.putImageData(id,i*SW+PAD,PAD);
    tiles.push({id:`npc_weapon_reserved_${i-8}`,col:i,row:0,
      tags:['npc','weapon','reserved','state:normal']});
  }
}
const META={atlas:'npc_weapon.png',tile_size:{w:TW,h:TH},slot_size:{w:SW,h:SH},
  padding:PAD,pivot:'center',perspective:'top-down-north-fixed',category:'npc',tiles};

// ── preview 4× ──
const prv=document.getElementById('prv');
prv.width=AW*4;prv.height=AH*4;
const pc=prv.getContext('2d');
for(let py=0;py<AH*4;py+=8)for(let px=0;px<AW*4;px+=8){
  pc.fillStyle=((Math.floor(px/8)+Math.floor(py/8))%2===0)?'#14162a':'#0c0e1c';
  pc.fillRect(px,py,8,8);
}
pc.imageSmoothingEnabled=false;
pc.drawImage(atl,0,0,AW*4,AH*4);
// ── downloads ──
document.getElementById('dlP').onclick=()=>atl.toBlob(b=>{
  const a=document.createElement('a');a.href=URL.createObjectURL(b);
  a.download='npc_weapon.png';a.click();
});
document.getElementById('dlJ').onclick=()=>{
  const b=new Blob([JSON.stringify(META,null,2)],{type:'application/json'});
  const a=document.createElement('a');a.href=URL.createObjectURL(b);
  a.download='npc_weapon.json';a.click();
};
</script>
</body>
</html>
