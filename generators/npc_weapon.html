<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>NPC Weapon Atlas Generator — Neutral Master</title>
<style>
*{box-sizing:border-box}
body{background:#0a0b0e;color:#c8d0e0;font-family:'Courier New',Courier,monospace;padding:20px;margin:0}
h2{color:#7090b0;margin:0 0 4px}
p{color:#4a5870;font-size:.85em;margin:0 0 12px}
canvas{display:block;image-rendering:pixelated;margin:8px 0}
.prv-wrap{overflow-x:auto;margin:8px 0;background:#06070a;padding:4px}
button{background:#151e30;color:#6099cc;border:1px solid #253550;padding:8px 18px;
        margin:4px;cursor:pointer;font-family:inherit;font-size:.9em;letter-spacing:.05em}
button:hover{background:#1e2e48}
</style>
</head>
<body>
<h2>NPC Weapon Atlas Generator — Neutral Master</h2>
<p>20 variants · 8 weapons + 12 reserved · 680×50px · + companion mask atlas</p>
<canvas id="atl"></canvas>
<canvas id="msk"></canvas>
<div class="prv-wrap"><canvas id="prv"></canvas></div>
<div>
  <button id="dlP">&#x2193; download npc_weapon.png</button>
  <button id="dlM">&#x2193; download npc_weapon_mask.png</button>
  <button id="dlJ">&#x2193; download npc_weapon.json</button>
</div>
<script>

const TW=32,TH=48,SW=34,SH=50,PAD=1;
const C={
  tBase:'#2d3040',tDeep:'#222530',tHi:'#424858',
  tLo:'#1c1f2c',tGrout:'#1a1d28',
  fBase:'#383c50',fLit:'#434860',fDark:'#252838',
  fShadow:'#141618',fBevel:'#4e5470',fGrout:'#161920',
  rHi:'#565e7a',rLo:'#2c3048',
  acc:'#4880aa',accG:'#111e30',accD:'#1a3a60',
};
// Metal (cool grey) and wood (warm grey) neutrals
const MMID='#909898',MLIT='#b0b8b8',MDRK='#606868';
const WMID='#906048',WLIT='#b08060',WDRK='#604030';
const OUTLINE='#080a0c';

function h2r(h){return[parseInt(h.slice(1,3),16),parseInt(h.slice(3,5),16),parseInt(h.slice(5,7),16)];}
function sp(d,x,y,col,a=255){if(x<0||y<0||x>=TW||y>=TH)return;const[r,g,b]=h2r(col),i=(y*TW+x)*4;d[i]=r;d[i+1]=g;d[i+2]=b;d[i+3]=a;}
function hl(d,x1,x2,y,col,a=255){for(let x=Math.max(0,x1);x<=Math.min(TW-1,x2);x++)sp(d,x,y,col,a);}
function fr(d,x1,y1,x2,y2,col,a=255){for(let y=Math.max(0,y1);y<=Math.min(TH-1,y2);y++)hl(d,x1,x2,y,col,a);}
function outline(d){
  const t=new Uint8ClampedArray(d.length);for(let i=0;i<d.length;i++)t[i]=d[i];
  for(let y=0;y<TH;y++)for(let x=0;x<TW;x++){
    if(t[(y*TW+x)*4+3]>0)continue;
    const nb=[[x-1,y],[x+1,y],[x,y-1],[x,y+1]];
    for(const[nx,ny]of nb)if(nx>=0&&nx<TW&&ny>=0&&ny<TH&&t[(ny*TW+nx)*4+3]>0){sp(d,x,y,OUTLINE);break;}
  }
}

const WEAPONS=[
  // 0: none
  (d)=>{},
  // 1: pistol
  (d)=>{fr(d,14,20,22,26,MMID);hl(d,15,21,20,MLIT);fr(d,10,26,17,28,MMID);fr(d,17,24,25,26,MMID);outline(d);},
  // 2: rifle (metal body + wood stock)
  (d)=>{fr(d,6,20,26,24,MMID);hl(d,7,25,20,MLIT);fr(d,14,24,22,30,WMID);outline(d);},
  // 3: shotgun (metal + wood)
  (d)=>{fr(d,6,20,25,24,MMID);hl(d,7,24,20,MLIT);fr(d,14,24,21,30,WMID);fr(d,7,24,12,26,MMID);outline(d);},
  // 4: knife (metal blade + wood handle)
  (d)=>{fr(d,14,10,17,34,MMID);hl(d,14,17,10,MLIT);fr(d,14,34,17,40,WMID);outline(d);},
  // 5: bat (wood)
  (d)=>{fr(d,14,8,18,40,WMID);hl(d,14,17,8,WLIT);hl(d,14,17,40,WDRK);outline(d);},
  // 6: wrench (metal)
  (d)=>{fr(d,14,10,18,40,MMID);fr(d,12,10,20,16,MMID);hl(d,13,19,10,MLIT);outline(d);},
  // 7: shield (metal body + darker emblem region for secondary slot)
  (d)=>{fr(d,10,10,22,36,MMID);hl(d,11,21,10,MLIT);fr(d,13,14,19,32,MDRK);outline(d);},
];

const SLOTS_LIST=[
  [],
  [{name:'body',mask_colour:'#ff0000'}],
  [{name:'body',mask_colour:'#ff0000'},{name:'stock',mask_colour:'#00ff00'}],
  [{name:'body',mask_colour:'#ff0000'},{name:'stock',mask_colour:'#00ff00'}],
  [{name:'blade',mask_colour:'#ff0000'},{name:'handle',mask_colour:'#00ff00'}],
  [{name:'primary',mask_colour:'#ff0000'}],
  [{name:'body',mask_colour:'#ff0000'}],
  [{name:'primary',mask_colour:'#ff0000'},{name:'emblem',mask_colour:'#00ff00'}],
];
const TYPE_NAMES=['none','pistol','rifle','shotgun','knife','bat','wrench','shield'];

const COLS=20,AW=COLS*SW,AH=SH;
const atl=document.getElementById('atl');atl.width=AW;atl.height=AH;
const msk=document.getElementById('msk');msk.width=AW;msk.height=AH;
const ctx=atl.getContext('2d');const mctx=msk.getContext('2d');
const tiles=[];

for(let c=0;c<20;c++){
  const id=ctx.createImageData(TW,TH);
  if(c<8)WEAPONS[c](id.data);
  ctx.putImageData(id,c*SW+PAD,PAD);
  const m=new ImageData(TW,TH);
  if(c<8&&c>0){
    const[or,og,ob]=h2r(OUTLINE);
    const[wr,wg,wb]=h2r(WMID);
    const[dr,dg,db]=h2r(MDRK);
    const slots=SLOTS_LIST[c];
    for(let i=0;i<id.data.length;i+=4){
      if(id.data[i+3]===0)continue;
      const r=id.data[i],g=id.data[i+1],b=id.data[i+2];
      if(r===or&&g===og&&b===ob){m.data[i]=0;m.data[i+1]=0;m.data[i+2]=0;m.data[i+3]=255;}
      // rifle/shotgun/knife: secondary slot maps wood (WMID) pixels to green
      else if(slots.length>1&&c!==7&&Math.abs(r-wr)<25&&Math.abs(g-wg)<25&&Math.abs(b-wb)<25){
        m.data[i]=0;m.data[i+1]=255;m.data[i+2]=0;m.data[i+3]=255;}
      // shield (c===7): secondary slot maps emblem (MDRK) pixels to green
      else if(slots.length>1&&c===7&&Math.abs(r-dr)<20&&Math.abs(g-dg)<20&&Math.abs(b-db)<20){
        m.data[i]=0;m.data[i+1]=255;m.data[i+2]=0;m.data[i+3]=255;}
      else{m.data[i]=255;m.data[i+1]=0;m.data[i+2]=0;m.data[i+3]=255;}
    }
  }
  mctx.putImageData(m,c*SW+PAD,PAD);
  const tname=c<8?TYPE_NAMES[c]:`reserved_${c-8}`;
  const ttag=c<8?`type:${TYPE_NAMES[c]}`:'type:reserved';
  tiles.push({id:`npc_weapon_${tname}`,col:c,row:0,
    tags:['npc','weapon',ttag,'state:normal'],colour_slots:c<8?SLOTS_LIST[c]:[]});
}

const META={atlas:'npc_weapon.png',mask_atlas:'npc_weapon_mask.png',
  tile_size:{w:TW,h:TH},slot_size:{w:SW,h:SH},padding:PAD,pivot:'center',
  perspective:'top-down-north-fixed',category:'npc',tiles};

const prv=document.getElementById('prv');prv.width=AW*4;prv.height=AH*4;
const pc=prv.getContext('2d');
for(let py=0;py<AH*4;py+=8)for(let px=0;px<AW*4;px+=8){pc.fillStyle=((Math.floor(px/8)+Math.floor(py/8))%2===0)?'#14162a':'#0c0e1c';pc.fillRect(px,py,8,8);}
pc.imageSmoothingEnabled=false;pc.drawImage(atl,0,0,AW*4,AH*4);

document.getElementById('dlP').onclick=()=>atl.toBlob(b=>{const a=document.createElement('a');a.href=URL.createObjectURL(b);a.download='npc_weapon.png';a.click();});
document.getElementById('dlM').onclick=()=>msk.toBlob(b=>{const a=document.createElement('a');a.href=URL.createObjectURL(b);a.download='npc_weapon_mask.png';a.click();});
document.getElementById('dlJ').onclick=()=>{const b=new Blob([JSON.stringify(META,null,2)],{type:'application/json'});const a=document.createElement('a');a.href=URL.createObjectURL(b);a.download='npc_weapon.json';a.click();};
</script>
</body>
</html>
