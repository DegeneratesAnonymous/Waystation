<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>NPC Weapon Neutral-Tone Master Generator</title>
<style>
*{box-sizing:border-box}
body{background:#0a0b0e;color:#c8d0e0;font-family:'Courier New',Courier,monospace;padding:20px;margin:0}
h2{color:#7090b0;margin:0 0 4px}
p{color:#4a5870;font-size:.85em;margin:0 0 12px}
canvas{display:block;image-rendering:pixelated;margin:8px 0}
.prv-wrap{overflow-x:auto;margin:8px 0;background:#06070a;padding:4px}
button{background:#151e30;color:#6099cc;border:1px solid #253550;padding:8px 18px;
        margin:4px;cursor:pointer;font-family:inherit;font-size:.9em;letter-spacing:.05em}
button:hover{background:#1e2e48}
</style>
</head>
<body>
<h2>NPC Weapon Neutral-Tone Master Generator</h2>
<p>20 slots · 8 weapon types + 12 reserved · 680×50px</p>
<canvas id="atl"></canvas>
<canvas id="msk"></canvas>
<div class="prv-wrap"><canvas id="prv"></canvas></div>
<div>
  <button id="dlP">&#x2193; download PNG</button>
  <button id="dlM">&#x2193; download Mask PNG</button>
  <button id="dlJ">&#x2193; download JSON</button>
</div>
<script>

const TW=32,TH=48,SW=34,SH=50,PAD=1;
const NEUT_METAL_BASE='#6c7480', NEUT_METAL_HI='#8c949c', NEUT_METAL_SH='#4c5258';
const NEUT_WOOD_BASE='#78644e',  NEUT_WOOD_HI='#94806a',  NEUT_WOOD_SH='#584838';
function h2r(h){return[parseInt(h.slice(1,3),16),parseInt(h.slice(3,5),16),parseInt(h.slice(5,7),16)];}
function sp(d,x,y,col,a=255){if(x<0||y<0||x>=TW||y>=TH)return;const[r,g,b]=h2r(col),i=(y*TW+x)*4;d[i]=r;d[i+1]=g;d[i+2]=b;d[i+3]=a;}
function hl(d,x1,x2,y,col,a=255){for(let x=Math.max(0,x1);x<=Math.min(TW-1,x2);x++)sp(d,x,y,col,a);}
function vl(d,x,y1,y2,col,a=255){for(let y=Math.max(0,y1);y<=Math.min(TH-1,y2);y++)sp(d,x,y,col,a);}
function fr(d,x1,y1,x2,y2,col,a=255){for(let y=Math.max(0,y1);y<=Math.min(TH-1,y2);y++)hl(d,x1,x2,y,col,a);}
function outline(d){
  const t=new Uint8ClampedArray(d.length);for(let i=0;i<d.length;i++)t[i]=d[i];
  for(let y=0;y<TH;y++)for(let x=0;x<TW;x++){
    if(t[(y*TW+x)*4+3]>0)continue;
    const nb=[[x-1,y],[x+1,y],[x,y-1],[x,y+1]];
    for(const[nx,ny]of nb)if(nx>=0&&nx<TW&&ny>=0&&ny<TH&&t[(ny*TW+nx)*4+3]>0){sp(d,x,y,'#080a0c');break;}
  }
}

const TYPE_NAMES=['none','pistol','rifle','shotgun','knife','bat','wrench','shieldweapon'];
function drawWeapon(d,t){
  if(t===0||t>=8)return;
  const MB=NEUT_METAL_BASE,MH=NEUT_METAL_HI,MS=NEUT_METAL_SH;
  const WB=NEUT_WOOD_BASE, WH=NEUT_WOOD_HI, WS=NEUT_WOOD_SH;
  if(t===1){fr(d,14,28,17,38,WB);fr(d,11,23,20,27,MB);hl(d,12,19,24,MH);}
  else if(t===2){fr(d,8,30,17,36,WB);hl(d,8,25,24,MB);fr(d,12,26,20,34,MB);hl(d,12,22,26,MH);}
  else if(t===3){fr(d,9,30,17,36,WB);hl(d,9,22,23,MB);hl(d,9,22,25,MS);fr(d,12,26,18,30,MB);}
  else if(t===4){fr(d,14,30,17,38,WB);fr(d,13,18,18,30,MB);vl(d,13,18,30,MH);}
  else if(t===5){fr(d,14,32,17,38,WB);fr(d,12,18,19,32,WB);vl(d,13,18,32,WH);}
  else if(t===6){fr(d,14,28,17,38,MB);fr(d,11,18,20,28,MB);fr(d,14,20,17,26,MS);hl(d,12,19,19,MH);}
  else if(t===7){fr(d,10,14,21,36,MB);vl(d,10,14,36,MS);vl(d,20,14,36,MS);fr(d,14,22,17,28,MS);hl(d,11,20,15,MH);}
  outline(d);
}
function drawWeaponMask(d,t){
  if(t===0||t>=8)return;
  const P='#ff0000';
  if(t===1){fr(d,14,28,17,38,P);}
  else if(t===2){fr(d,8,30,17,36,P);}
  else if(t===3){fr(d,9,30,17,36,P);}
  else if(t===4){fr(d,14,30,17,38,P);}
  else if(t===5){fr(d,12,18,19,38,P);}
  else if(t===6){fr(d,11,18,20,38,P);}
  else if(t===7){fr(d,10,14,21,36,P);}
}

const COLS=20,AW=COLS*SW,AH=SH;
const atl=document.getElementById('atl'),msk=document.getElementById('msk');
atl.width=AW;atl.height=AH;msk.width=AW;msk.height=AH;
const actx=atl.getContext('2d'),mctx=msk.getContext('2d');
const tiles=[];
for(let s=0;s<COLS;s++){
  const id=actx.createImageData(TW,TH);drawWeapon(id.data,s);actx.putImageData(id,s*SW+PAD,PAD);
  const mid=mctx.createImageData(TW,TH);drawWeaponMask(mid.data,s);mctx.putImageData(mid,s*SW+PAD,PAD);
  let tileId,tags,slots;
  if(s===0){tileId='npc_weapon_none';tags=['npc','weapon','type:none'];slots=[];}
  else if(s<=7){tileId=`npc_weapon_${TYPE_NAMES[s]}`;tags=['npc','weapon',`type:${TYPE_NAMES[s]}`];slots=[{name:'primary',mask_colour:'#ff0000'}];}
  else{tileId=`npc_weapon_reserved_${s.toString().padStart(2,'0')}`;tags=['npc','weapon','state:reserved'];slots=[];}
  tiles.push({id:tileId,col:s,row:0,tags,colour_slots:slots});
}
const META={atlas:'npc_weapon.png',mask_atlas:'npc_weapon_mask.png',tile_size:{w:TW,h:TH},slot_size:{w:SW,h:SH},
  padding:PAD,pivot:'center',perspective:'top-down-north-fixed',category:'npc',tiles};

const prv=document.getElementById('prv');prv.width=AW*4;prv.height=AH*4;
const pc=prv.getContext('2d');
for(let py=0;py<AH*4;py+=8)for(let px=0;px<AW*4;px+=8){pc.fillStyle=((Math.floor(px/8)+Math.floor(py/8))%2===0)?'#14162a':'#0c0e1c';pc.fillRect(px,py,8,8);}
pc.imageSmoothingEnabled=false;pc.drawImage(atl,0,0,AW*4,AH*4);

document.getElementById('dlP').onclick=()=>atl.toBlob(b=>{const a=document.createElement('a');a.href=URL.createObjectURL(b);a.download='npc_weapon.png';a.click();});
document.getElementById('dlM').onclick=()=>msk.toBlob(b=>{const a=document.createElement('a');a.href=URL.createObjectURL(b);a.download='npc_weapon_mask.png';a.click();});
document.getElementById('dlJ').onclick=()=>{const b=new Blob([JSON.stringify(META,null,2)],{type:'application/json'});const a=document.createElement('a');a.href=URL.createObjectURL(b);a.download='npc_weapon.json';a.click();};
</script>
</body>
</html>
